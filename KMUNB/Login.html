<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #e8a598;
      --rose-dk: #c97b6e;
      --blush:   #f5e6e0;
      --cream:   #fdf6f2;
      --text:    #3a2a25;
      --muted:   #9c7b74;
      --glass:   rgba(255,255,255,0.55);
      --shadow:  0 20px 60px rgba(180,100,80,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #f0b8a8, #f5d5cc);
      top: -120px; right: -80px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #e8cfc8, #f8ebe6);
      bottom: -100px; left: -60px;
      animation: drift2 14s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(-30px, 40px) scale(1.05); } }
    @keyframes drift2 { to { transform: translate(30px, -30px) scale(1.08); } }

    /* Petals */
    .petal {
      position: fixed;
      border-radius: 0 60% 0 60%;
      background: rgba(232,165,152,0.35);
      pointer-events: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.4); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 32px;
      padding: 44px 40px 36px;
      width: 360px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Logo */
    .logo-mark {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, #f2b8a8, #e88070);
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(232,128,112,0.35);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 20px rgba(232,128,112,0.35); }
      50%      { box-shadow: 0 8px 28px rgba(232,128,112,0.55); }
    }
    .logo-mark svg { width: 26px; height: 26px; fill: white; }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.01em;
      margin-bottom: 5px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 26px;
      font-weight: 300;
    }

    /* Fields */
    .fields { display: flex; flex-direction: column; gap: 12px; }

    .field {
      position: relative;
      animation: fadein 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .field:nth-child(1) { animation-delay: 0.15s; }
    .field:nth-child(2) { animation-delay: 0.22s; }
    .field:nth-child(3) { animation-delay: 0.29s; }
    @keyframes fadein {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .field-icon {
      position: absolute;
      left: 15px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .field-icon svg { width: 17px; height: 17px; fill: var(--muted); transition: fill 0.2s; }

    .field input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border-radius: 16px;
      border: 1.5px solid rgba(232,165,152,0.22);
      background: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field input::placeholder { color: var(--muted); font-weight: 300; }
    .field input:focus {
      border-color: var(--rose);
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 0 4px rgba(232,165,152,0.15);
    }
    .field input:focus ~ .field-icon svg { fill: var(--rose); }

    /* Eye toggle for password */
    .eye-btn {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: flex; align-items: center;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--rose-dk); }
    .eye-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* Toggle row */
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0 18px;
      animation: fadein 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .toggle-track {
      width: 38px; height: 21px;
      background: #ddd;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .toggle-track.on { background: var(--rose); }
    .toggle-knob {
      position: absolute;
      left: 3px; top: 3px;
      width: 15px; height: 15px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-knob { transform: translateX(17px); }
    .toggle-label {
      font-size: 13px; color: var(--muted); cursor: pointer;
      user-select: none;
    }

    /* Sign Up button */
    .btn-signup {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #efaa9a, #e07060);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(224,112,96,0.35);
      transition: transform 0.18s, box-shadow 0.18s;
      animation: fadein 0.6s 0.42s cubic-bezier(0.16,1,0.3,1) both;
    }
    .btn-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(224,112,96,0.45);
    }
    .btn-signup:active { transform: translateY(0); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-anim 0.55s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim { to { transform: scale(5); opacity: 0; } }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 16px;
      animation: fadein 0.6s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,120,110,0.25), transparent);
    }
    .divider span { font-size: 12.5px; color: var(--muted); font-weight: 300; white-space: nowrap; }

    /* Social buttons */
    .social {
      display: flex; justify-content: center; gap: 14px;
      animation: fadein 0.6s 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    .social-btn {
      width: 50px; height: 50px;
      border-radius: 14px;
      border: 1.5px solid rgba(232,165,152,0.22);
      background: rgba(255,255,255,0.75);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background 0.18s;
    }
    .social-btn:hover {
      transform: translateY(-3px);
      border-color: var(--rose);
      background: white;
      box-shadow: 0 6px 18px rgba(232,165,152,0.25);
    }
    .social-btn img { width: 25px; height: 25px; display: block; }
    a.social-btn { text-decoration: none; }

    /* Login link */
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      animation: fadein 0.6s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-link a {
      color: var(--rose-dk);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .login-link a:hover { color: #b05040; text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
    </svg>
  </div>

  <h2>Let's Get Started</h2>
  <p class="subtitle">สร้างบัญชีใหม่ของคุณวันนี้</p>

  <div class="fields">
    <!-- Name -->
    <div class="field">
      <input type="text" placeholder="Your Name" id="name">
      <span class="field-icon">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </span>
    </div>

    <!-- Email -->
    <div class="field">
      <input type="email" placeholder="Email Address" id="email">
      <span class="field-icon">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </span>
    </div>

    <!-- Password -->
    <div class="field">
      <input type="password" placeholder="Password" id="password">
      <span class="field-icon">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
      </span>
      <button class="eye-btn" onclick="togglePwd(this)" type="button" aria-label="Show password">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
      </button>
    </div>
  </div>

  <!-- Toggle -->
  <div class="toggle-row" style="margin-top:14px;">
    <div class="toggle-track" id="toggleTrack" onclick="this.classList.toggle('on')">
      <div class="toggle-knob"></div>
    </div>
    <label class="toggle-label" onclick="document.getElementById('toggleTrack').classList.toggle('on')">อนุญาตเชื่อมแอปอื่น</label>
  </div>

  <!-- Sign Up -->
  <button class="btn-signup" onclick="handleSignup(event)">Sign Up</button>

  <!-- Divider -->
  <div class="divider"><span>หรือสมัครผ่าน</span></div>

  <!-- Social -->
  <div class="social">
    <a class="social-btn" href="https://accounts.google.com/signin" target="_blank" rel="noopener noreferrer" title="Sign in with Google">
      <img src="https://img.icons8.com/color/48/google-logo.png" alt="Google">
    </a>
    <div class="social-btn">
      <img src="https://img.icons8.com/color/48/line-me.png" alt="Line">
    </div>
    <div class="social-btn">
      <img src="https://img.icons8.com/color/48/facebook-new.png" alt="Facebook">
    </div>
  </div>

  <!-- Login link -->
  <p class="login-link">มีบัญชีอยู่แล้ว? <a href="#">เข้าสู่ระบบ</a></p>
</div>

<script>
  // Falling petals
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      left: ${Math.random() * 100}vw;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${8 + Math.random() * 14}s;
      animation-delay: ${Math.random() * 12}s;
      opacity: ${0.2 + Math.random() * 0.4};
    `;
    document.body.appendChild(p);
  }

  // Password toggle
  function togglePwd(btn) {
    const inp = document.getElementById('password');
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = showing
      ? '<path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>'
      : '<path d="M3.3 3.3L1.9 4.7 4.6 7.4C2.9 8.8 1.6 10.8 1 13c1.7 4.4 6 7.5 11 7.5 1.9 0 3.6-.5 5.2-1.3l3.1 3.1 1.4-1.4L3.3 3.3zM12 18.5c-3.8 0-7-2.4-8.5-5.5.6-1.4 1.5-2.6 2.6-3.6l2 2C7.7 12 7.5 12.5 7.5 13c0 2.5 2 4.5 4.5 4.5.5 0 1-.2 1.4-.4l1.7 1.7c-.9.4-2 .7-3.1.7zm8.5-5.5c-.4 1-.9 1.8-1.6 2.6l-7.7-7.7C12 7.7 12.5 7.5 13 7.5c2.5 0 4.5 2 4.5 4.5 0 .5-.2 1-.4 1.4l1.7 1.7c.9-1 1.5-2.1 1.9-3.1.1-.4.1-.7.2-1-.6-3.1-3.9-5.5-7.4-5.5-1 0-2 .2-2.8.5l2 2c.3-.1.5-.1.8-.1 2.5 0 4.5 2 4.5 4.5 0 .5-.2 1-.4 1.4z"/>';
  }

  // Ripple effect
  function handleSignup(e) {
    const btn = e.currentTarget;
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
    // Navigate after short delay
    setTimeout(() => window.location.href = 'scanner.html', 300);
  }
</script>
</body>
</html>
