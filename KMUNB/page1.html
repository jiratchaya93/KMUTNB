<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Energy Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:     #e8a598;
      --rose-dk:  #c97b6e;
      --rose-lt:  #f5d5cc;
      --cream:    #fdf6f2;
      --text:     #3a2a25;
      --muted:    #9c7b74;
      --glass:    rgba(255,255,255,0.72);
      --shadow:   0 8px 28px rgba(180,100,80,0.13);
      --shadow-sm:0 4px 14px rgba(180,100,80,0.09);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.48;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #f0b8a8, #f5d5cc);
      top: -100px; right: -80px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 340px; height: 340px;
      background: radial-gradient(circle, #e8cfc8, #f8ebe6);
      bottom: -80px; left: -60px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(-20px, 30px) scale(1.05); } }
    @keyframes drift2 { to { transform: translate(20px, -20px) scale(1.08); } }

    /* Petals */
    .petal {
      position: fixed;
      border-radius: 0 60% 0 60%;
      background: rgba(232,165,152,0.3);
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.4); opacity: 0; }
    }

    /* Phone shell — glassmorphism card like signup page */
    .phone {
      position: relative;
      z-index: 10;
      width: 375px;
      height: 780px;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(180,100,80,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: hidden;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      border-radius: 0 0 4px 4px;
      z-index: 20;
      pointer-events: none;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .status-bar .time { font-size: 15px; font-weight: 500; color: var(--text); }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .status-icons svg { width: 15px; height: 15px; fill: var(--muted); }

    /* Header */
    .header {
      padding: 4px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadein 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .header-left h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .header-left p {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1px;
    }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f2b8a8, #e88070);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(232,128,112,0.3);
      font-size: 16px;
    }

    /* Scrollable content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 108px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Section label */
    .section-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 8px 4px 10px;
    }
    .section-label h2 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .section-label span {
      font-size: 11px;
      color: var(--rose-dk);
      font-weight: 400;
      letter-spacing: 0.04em;
    }
    .section-sub {
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 300;
      margin-left: 4px;
    }

    /* ─── GRAPH CARD ─── */
    .graph-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 18px 16px 14px;
      box-shadow: var(--shadow);
      animation: fadein 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
    }
    .graph-card::before {
      content: '';
      position: absolute;
      top: 0; left: 30px; right: 30px; height: 2.5px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      border-radius: 0 0 3px 3px;
    }

    .graph-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .graph-meta-left {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }
    .graph-meta-left strong {
      display: block;
      font-size: 22px;
      font-weight: 400;
      font-family: 'Cormorant Garamond', serif;
      color: var(--text);
      line-height: 1.1;
    }
    .graph-meta-left em {
      font-style: normal;
      font-size: 12px;
      color: var(--muted);
    }
    .time-tabs {
      display: flex;
      gap: 4px;
    }
    .time-tab {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-tab.active {
      background: linear-gradient(135deg, #efaa9a, #e07060);
      color: white;
      box-shadow: 0 3px 10px rgba(224,112,96,0.3);
    }

    /* SVG chart area */
    .chart-wrap { position: relative; }
    .chart-wrap svg { width: 100%; display: block; }

    /* Peak label bubble */
    .peak-bubble {
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-18px);
      background: linear-gradient(135deg, #efaa9a, #e07060);
      color: white;
      font-size: 10.5px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 12px;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(224,112,96,0.35);
      pointer-events: none;
    }
    .peak-bubble::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #e07060;
      border-bottom: none;
    }

    /* Y-axis labels */
    .y-labels {
      position: absolute;
      left: 0; top: 0; bottom: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }
    .y-labels span {
      font-size: 9px;
      color: var(--muted);
      font-weight: 300;
      opacity: 0.7;
    }

    /* Max demand info card */
    .info-strip {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .info-pill {
      flex: 1;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(232,165,152,0.2);
      border-radius: 16px;
      padding: 11px 14px;
      box-shadow: var(--shadow-sm);
    }
    .info-pill-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .info-pill-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .info-pill-value em {
      font-style: normal;
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      margin-left: 3px;
    }
    .info-pill-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1px;
    }

    /* ─── MONTHLY CARD ─── */
    .monthly-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 20px 18px;
      box-shadow: var(--shadow);
      animation: fadein 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
      margin-top: 14px;
    }
    .monthly-card::before {
      content: '';
      position: absolute;
      top: 0; left: 30px; right: 30px; height: 2.5px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      border-radius: 0 0 3px 3px;
    }

    .monthly-cols {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
    .monthly-col {
      flex: 1;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(232,165,152,0.18);
      border-radius: 18px;
      padding: 16px 14px;
    }
    .monthly-col-label {
      font-size: 10.5px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .monthly-col-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      line-height: 1;
    }
    .monthly-col-unit {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 4px;
    }
    .monthly-col-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(220,80,70,0.10);
      color: #c0443a;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 10px;
      margin-top: 8px;
    }

    /* Monthly mini bar chart */
    .mini-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
      margin-top: 12px;
    }
    .mini-bar {
      flex: 1;
      border-radius: 4px 4px 2px 2px;
      background: linear-gradient(to top, #efaa9a, #f5c8bc);
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .mini-bar.active { opacity: 1; }

    /* ─── QUICK STATS ROW ─── */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      animation: fadein 0.6s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(232,165,152,0.18);
      border-radius: 18px;
      padding: 14px 12px;
      box-shadow: var(--shadow-sm);
    }
    .stat-icon {
      width: 30px; height: 30px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .stat-icon.green { background: rgba(125,206,130,0.15); }
    .stat-icon.amber { background: rgba(245,183,90,0.15); }
    .stat-icon.rose  { background: rgba(232,165,152,0.2); }
    .stat-label { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; }
    .stat-value { font-size: 17px; font-weight: 500; color: var(--text); margin-top: 2px; }
    .stat-value em { font-style: normal; font-size: 10px; color: var(--muted); font-weight: 300; }

    /* ─── BOTTOM NAV — same style as scanner.html icon-glass ─── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 24px 22px;
      background: rgba(253,246,242,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(232,165,152,0.15);
      z-index: 100;
      border-radius: 0 0 40px 40px;
    }
    .nav-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
    .nav-icon {
      width: 62px; height: 62px;
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow:
        0 4px 16px rgba(180,90,70,0.10),
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -1px 0 rgba(200,140,120,0.08);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .nav-icon::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.10) 100%);
      border-radius: 18px 18px 60% 60% / 18px 18px 40% 40%;
      pointer-events: none;
      z-index: 2;
    }
    .nav-icon.active {
      background: linear-gradient(135deg, #efaa9a, #e07060);
      box-shadow:
        0 6px 20px rgba(224,112,96,0.38),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 0 rgba(180,60,40,0.1);
    }
    .nav-icon svg { width: 36px; height: 36px; position: relative; z-index: 1; }
    .nav-item:hover .nav-icon {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px rgba(180,90,70,0.16), inset 0 1px 0 rgba(255,255,255,0.95);
    }
    .nav-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }
    .nav-item.active .nav-label { color: var(--rose-dk); font-weight: 500; }
  </style>
</head>
<body>

<div class="phone">

  

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Energy Monitor</h1>
      <p>วันนี้, พุธ 19 มีนาคม 2568</p>
    </div>
    <div class="avatar">⚡</div>
  </div>

  <!-- Scrollable content -->
  <div class="content">

    <!-- Daily Overview -->
    <div class="section-label" style="animation: fadein 0.5s 0.15s both;">
      <div>
        <h2>ภาพรวมรายวัน</h2>
        <span class="section-sub">Daily Overview</span>
      </div>
      <span>วันนี้ ›</span>
    </div>

    <div class="graph-card">
      <div class="graph-meta">
        <div class="graph-meta-left">
          <em>Peak demand</em>
          <strong>77.5 <span style="font-size:14px;font-family:'DM Sans',sans-serif;font-weight:300;color:var(--muted)">kW</span></strong>
        </div>
        <div class="time-tabs">
          <div class="time-tab">6h</div>
          <div class="time-tab active">24h</div>
          <div class="time-tab">7d</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-wrap">
        <svg viewBox="0 0 343 110" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8a598" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#e8a598" stop-opacity="0.02"/>
            </linearGradient>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#f5c0b0"/>
              <stop offset="100%" stop-color="#d4685a"/>
            </linearGradient>
          </defs>

          <!-- Grid lines -->
          <line x1="28" y1="20" x2="335" y2="20" stroke="rgba(180,100,80,0.08)" stroke-width="1"/>
          <line x1="28" y1="45" x2="335" y2="45" stroke="rgba(180,100,80,0.08)" stroke-width="1"/>
          <line x1="28" y1="70" x2="335" y2="70" stroke="rgba(180,100,80,0.08)" stroke-width="1"/>
          <line x1="28" y1="88" x2="335" y2="88" stroke="rgba(180,100,80,0.06)" stroke-width="1"/>

          <!-- Area fill -->
          <path d="M28 80 C50 75, 70 72, 90 65 C110 58, 120 50, 140 42 C155 35, 168 28, 183 18 C198 28, 210 35, 228 48 C248 60, 268 68, 288 62 C305 57, 320 52, 335 55 L335 88 L28 88 Z"
                fill="url(#areaGrad)"/>

          <!-- Line -->
          <path d="M28 80 C50 75, 70 72, 90 65 C110 58, 120 50, 140 42 C155 35, 168 28, 183 18 C198 28, 210 35, 228 48 C248 60, 268 68, 288 62 C305 57, 320 52, 335 55"
                stroke="url(#lineGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

          <!-- Peak dot -->
          <circle cx="183" cy="18" r="4.5" fill="#e07060"/>
          <circle cx="183" cy="18" r="7.5" fill="#e07060" opacity="0.2"/>

          <!-- X-axis labels -->
          <text x="28"  y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">00:00</text>
          <text x="80"  y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">06:00</text>
          <text x="136" y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">12:00</text>
          <text x="183" y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">15:00</text>
          <text x="240" y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">18:00</text>
          <text x="335" y="104" font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(156,123,116,0.7)" text-anchor="middle">24:00</text>

          <!-- Y-axis labels -->
          <text x="22" y="22"  font-family="DM Sans, sans-serif" font-size="8" fill="rgba(156,123,116,0.65)" text-anchor="end">80</text>
          <text x="22" y="47"  font-family="DM Sans, sans-serif" font-size="8" fill="rgba(156,123,116,0.65)" text-anchor="end">60</text>
          <text x="22" y="72"  font-family="DM Sans, sans-serif" font-size="8" fill="rgba(156,123,116,0.65)" text-anchor="end">40</text>
          <text x="22" y="90"  font-family="DM Sans, sans-serif" font-size="8" fill="rgba(156,123,116,0.65)" text-anchor="end">20</text>
        </svg>

        <!-- Peak bubble tooltip -->
        <div class="peak-bubble" style="left:53%;top:4px;">⚡ 77.5 kW</div>
      </div>

      <!-- Info strip -->
      <div class="info-strip">
        <div class="info-pill">
          <div class="info-pill-label">Max Demand</div>
          <div class="info-pill-value">77.5 <em>kW</em></div>
          <div class="info-pill-sub">15:00 น.</div>
        </div>
        <div class="info-pill">
          <div class="info-pill-label">Estimated Cost</div>
          <div class="info-pill-value">152 <em>บาท</em></div>
          <div class="info-pill-sub">วันนี้</div>
        </div>
      </div>
    </div>

    <!-- Monthly Overview -->
    <div class="section-label" style="margin-top:20px;animation: fadein 0.5s 0.3s both;">
      <div>
        <h2>ภาพรวมเดือนนี้</h2>
        <span class="section-sub">Monthly Overview</span>
      </div>
      <span>มีนาคม ›</span>
    </div>

    <div class="monthly-card">
      <div class="monthly-cols">
        <!-- Predicted Units -->
        <div class="monthly-col">
          <div class="monthly-col-label">Predicted Units</div>
          <div class="monthly-col-value">1,562</div>
          <div class="monthly-col-unit">kWh คาดการณ์</div>
          <div class="mini-bars" style="margin-top:10px;">
            <div class="mini-bar" style="height:40%"></div>
            <div class="mini-bar" style="height:55%"></div>
            <div class="mini-bar" style="height:48%"></div>
            <div class="mini-bar" style="height:65%"></div>
            <div class="mini-bar" style="height:72%"></div>
            <div class="mini-bar active" style="height:85%"></div>
            <div class="mini-bar" style="height:60%;opacity:0.25"></div>
          </div>
        </div>

  // Petals
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 5 + Math.random() * 7;
    p.style.cssText = `
      left: ${Math.random() * 100}vw;
      width: ${size}px; height: ${size}px;
      animation-duration: ${10 + Math.random() * 14}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${0.15 + Math.random() * 0.3};
    `;
    document.body.appendChild(p);
  }

  // Time tab switching
  document.querySelectorAll('.time-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>
